<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>

        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "inverse-surface": "#233144",
                        "inverse-on-surface": "#eaf1ff",
                        "surface-variant": "#d5e3fc",
                        "on-secondary-fixed": "#140f54",
                        "primary-fixed-dim": "#c3c0ff",
                        "outline": "#777587",
                        "surface-tint": "#4d44e3",
                        "on-secondary": "#ffffff",
                        "surface-container-highest": "#d5e3fc",
                        "surface-container-lowest": "#ffffff",
                        "primary": "#3525cd",
                        "on-tertiary-container": "#ffd2be",
                        "on-error": "#ffffff",
                        "primary-container": "#4f46e5",
                        "on-primary-container": "#dad7ff",
                        "tertiary-container": "#a44100",
                        "secondary-container": "#b6b4ff",
                        "error": "#ba1a1a",
                        "on-surface-variant": "#464555",
                        "inverse-primary": "#c3c0ff",
                        "on-background": "#0d1c2e",
                        "on-tertiary-fixed": "#351000",
                        "error-container": "#ffdad6",
                        "tertiary-fixed-dim": "#ffb695",
                        "on-surface": "#0d1c2e",
                        "on-error-container": "#93000a",
                        "secondary": "#58579b",
                        "surface-dim": "#ccdbf3",
                        "primary-fixed": "#e2dfff",
                        "on-secondary-fixed-variant": "#413f82",
                        "tertiary-fixed": "#ffdbcc",
                        "on-primary-fixed-variant": "#3323cc",
                        "surface": "#f8f9ff",
                        "on-primary": "#ffffff",
                        "secondary-fixed-dim": "#c3c0ff",
                        "tertiary": "#7e3000",
                        "on-tertiary-fixed-variant": "#7b2f00",
                        "background": "#f8f9ff",
                        "surface-container-high": "#dce9ff",
                        "on-secondary-container": "#454386",
                        "surface-container-low": "#eff4ff",
                        "surface-bright": "#f8f9ff",
                        "surface-container": "#e6eeff",
                        "secondary-fixed": "#e2dfff",
                        "outline-variant": "#c7c4d8",
                        "on-primary-fixed": "#0f0069",
                        "on-tertiary": "#ffffff"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "headline": ["Inter"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    }
                },
            },
        }
    </script>
<style>
        body { font-family: 'Inter', sans-serif; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .signature-gradient {
            background: linear-gradient(135deg, #3525cd 0%, #4f46e5 100%);
        }
        .glass-panel {
            background-color: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px);
        }
    </style>
</head>
<body class="bg-surface text-on-surface selection:bg-primary-container selection:text-on-primary-container min-h-screen flex flex-col">
<main class="flex-grow flex items-center justify-center p-6 sm:p-12 relative overflow-hidden">
<!-- Background Editorial Element -->
<div class="absolute top-0 left-0 w-full h-full overflow-hidden -z-10 opacity-40">
<div class="absolute -top-[10%] -left-[5%] w-[40%] h-[60%] rounded-full bg-surface-container-high blur-[120px]"></div>
<div class="absolute -bottom-[10%] -right-[5%] w-[40%] h-[60%] rounded-full bg-secondary-container blur-[120px] opacity-30"></div>
</div>
<div class="w-full max-w-md">
<!-- Brand Anchor -->
<div class="mb-12 text-center md:text-left">
<div class="flex items-center gap-3 mb-4 justify-center md:justify-start">
<div class="w-10 h-10 signature-gradient rounded-xl flex items-center justify-center text-white shadow-[0_10px_20px_rgba(53,37,205,0.2)]">
<span class="material-symbols-outlined text-2xl" data-icon="inventory_2">inventory_2</span>
</div>
<span class="text-2xl font-black tracking-tighter text-on-surface">Fluid Custodian</span>
</div>
<h1 class="text-4xl font-bold tracking-tight text-on-surface mb-2">Welcome Back.</h1>
<p class="text-on-surface-variant text-sm font-medium">Please enter your credentials to access the ledger.</p>
</div>
<!-- Login Card -->
<div class="bg-surface-container-lowest rounded-xl p-8 shadow-[0_20px_40px_rgba(13,28,46,0.06)] relative group">
<!-- Intentional Asymmetry: Small Decorative Header -->
<div class="absolute -top-3 -right-3 px-4 py-1.5 signature-gradient rounded-full shadow-lg">
<span class="text-[10px] font-bold text-white uppercase tracking-widest">Portal Access</span>
</div>
<form class="space-y-6">
<!-- Email Field -->
<div class="space-y-2">
<label class="text-xs font-bold uppercase tracking-widest text-on-surface-variant px-1" for="email">Email Address</label>
<div class="relative">
<input class="w-full bg-surface-container-low border-0 border-b-2 border-transparent focus:border-primary focus:ring-0 rounded-lg py-3 px-4 transition-all placeholder:text-outline-variant text-on-surface font-medium" id="email" name="email" placeholder="name@organization.com" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-2">
<div class="flex justify-between items-center px-1">
<label class="text-xs font-bold uppercase tracking-widest text-on-surface-variant" for="password">Password</label>
<a class="text-xs font-bold text-primary hover:text-primary-container transition-colors" href="#">Forgot Access?</a>
</div>
<div class="relative">
<input class="w-full bg-surface-container-low border-0 border-b-2 border-transparent focus:border-primary focus:ring-0 rounded-lg py-3 px-4 transition-all placeholder:text-outline-variant text-on-surface font-medium" id="password" name="password" placeholder="••••••••" type="password"/>
</div>
</div>
<!-- CTA Actions -->
<div class="space-y-4 pt-4">
<div class="grid grid-cols-1 gap-3">
<!-- Admin Login -->
<button class="signature-gradient text-white font-bold py-4 px-6 rounded-xl shadow-lg hover:shadow-indigo-500/20 active:scale-[0.98] transition-all flex items-center justify-center gap-2 group" type="submit">
<span>Login as Admin</span>
<span class="material-symbols-outlined text-lg group-hover:translate-x-1 transition-transform" data-icon="shield_person">shield_person</span>
</button>
<!-- User Login -->
<button class="bg-secondary-container text-on-secondary-container font-bold py-4 px-6 rounded-xl hover:bg-on-secondary-fixed-variant/10 active:scale-[0.98] transition-all flex items-center justify-center gap-2" type="button">
<span>Login as User</span>
<span class="material-symbols-outlined text-lg" data-icon="person">person</span>
</button>
</div>
</div>
</form>
<div class="mt-8 pt-8 border-t border-surface-container flex flex-col sm:flex-row justify-between items-center gap-4">
<span class="text-xs font-medium text-on-surface-variant">Secured by Vanguard Protocol</span>
<div class="flex gap-4">
<span class="w-2 h-2 rounded-full bg-on-tertiary-fixed-variant"></span>
<span class="w-2 h-2 rounded-full bg-outline-variant opacity-30"></span>
<span class="w-2 h-2 rounded-full bg-outline-variant opacity-30"></span>
</div>
</div>
</div>
<!-- Footer Text Links -->
<div class="mt-8 flex justify-center gap-6 text-xs font-bold text-on-surface-variant opacity-60">
<a class="hover:text-primary transition-colors" href="#">Terms of Service</a>
<a class="hover:text-primary transition-colors" href="#">Privacy Policy</a>
<a class="hover:text-primary transition-colors" href="#">System Health</a>
</div>
</div>
<!-- Asymmetric Visual Anchor -->
<div class="hidden lg:block absolute -right-20 top-1/2 -translate-y-1/2 w-[400px] h-[600px] bg-surface-container-low rounded-[40px] rotate-6 overflow-hidden shadow-2xl">
<img alt="Professional workspace" class="w-full h-full object-cover grayscale opacity-20 contrast-125" data-alt="Monochrome close-up of high-end architectural studio equipment, drafting tools, and sleek modern surfaces with cinematic lighting" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDecW4ZGNW_bN3cJ4wpu0TnhU4U3eXKpE5WPSiae_86BPZkKOLcCPIYnkEEduF3603ImYCSjOXrQWI1K84qMEed1ZYcV1ZEtCGW1Q16yWojCjPzjop50H-Ka7rCTTory-KwrFUamzIjk9D1aaeU9QvFfVFeEDH6VtuR_lpwSnUS23e9mg6MRmeQmKS95PDiofykJgCcTrC06km3pNb8RBGX7Twi0HBGyzE6xNEyI_GKm6x6qb8I5YNfDOHl_pT4AJT9v-51X3HGJWQ"/>
<div class="absolute inset-0 bg-primary/10 mix-blend-multiply"></div>
<div class="absolute bottom-12 left-12 right-12">
<p class="text-indigo-900 font-bold text-3xl tracking-tight leading-tight mb-4">"The foundation of institutional trust is seamless custody."</p>
<p class="text-indigo-800/60 text-sm font-bold uppercase tracking-widest">— Custodian Charter</p>
</div>
</div>
</main>
</body></html>
