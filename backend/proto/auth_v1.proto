syntax = "proto3";

package auth_v1;

service AuthService {
  rpc Register (RegisterRequest) returns (AuthReply);
  rpc Login (LoginRequest) returns (AuthReply);
  // Requires metadata: authorization: Bearer <jwt>
  rpc Me (Empty) returns (MeReply);
}

message Empty {}

message RegisterRequest {
  string email = 1;
  string password = 2;
  optional string name = 3;
}

message LoginRequest {
  string email = 1;
  string password = 2;
}

message AuthReply {
  string token = 1;
  PublicUser user = 2;
}

message MeReply {
  PublicUser user = 1;
}

message PublicUser {
  string id = 1;
  string email = 2;
  string role = 3;
  string name = 4;
  string avatar_url = 5;
}
